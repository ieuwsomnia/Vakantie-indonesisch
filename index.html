<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kosakata Liburan — Vakantie-Indonesisch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF4E9;
    --ink:#1B2B2A;
    --teal:#1B4D4A;
    --teal-dark:#0F3431;
    --marigold:#E8762C;
    --terracotta:#C1432D;
    --sage:#3F7D6B;
    --paper:#FFFDF8;
    --line:#D9CDB5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .app{
    width:100%;
    max-width:440px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:0 0 24px;
  }

  /* ---------- HEADER (ticket stub) ---------- */
  .ticket-header{
    background:var(--teal);
    color:var(--paper);
    padding:18px 20px 14px;
    border-bottom:3px dashed var(--marigold);
    position:relative;
  }
  .ticket-header .eyebrow{
    font-family:'Space Grotesk',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.75;
    display:flex;
    justify-content:space-between;
  }
  .ticket-header h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:26px;
    margin:6px 0 2px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .ticket-header h1 svg{flex-shrink:0;}
  .ticket-header .sub{
    font-size:13px;
    opacity:.85;
  }
  .punch{
    position:absolute;
    width:18px;height:18px;
    background:var(--cream);
    border-radius:50%;
    bottom:-12px;
  }
  .punch.left{left:14px;}
  .punch.right{right:14px;}

  /* ---------- CONTROLS ---------- */
  .controls{
    padding:18px 18px 4px;
  }
  .cat-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:10px;
    scrollbar-width:none;
  }
  .cat-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    padding:7px 13px;
    border-radius:999px;
    border:1.5px solid var(--line);
    background:var(--paper);
    color:var(--teal-dark);
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{
    background:var(--teal);
    border-color:var(--teal);
    color:var(--paper);
  }
  .filter-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:4px;
    font-size:13px;
  }
  .toggle{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    user-select:none;
    font-weight:600;
    color:var(--teal-dark);
  }
  .toggle input{
    width:34px;height:20px;
    appearance:none;
    background:var(--line);
    border-radius:999px;
    position:relative;
    cursor:pointer;
    outline:none;
    transition:.2s;
  }
  .toggle input:checked{background:var(--marigold);}
  .toggle input::before{
    content:'';
    position:absolute;
    width:16px;height:16px;
    background:var(--paper);
    border-radius:50%;
    top:2px;left:2px;
    transition:.2s;
  }
  .toggle input:checked::before{transform:translateX(14px);}
  .deck-count{
    font-family:'Space Grotesk',monospace;
    font-size:12px;
    color:var(--sage);
    font-weight:700;
  }

  /* ---------- CARD STAGE ---------- */
  .card-stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:14px 20px;
    perspective:1400px;
  }
  .flashcard{
    width:100%;
    min-height:280px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .45s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .flashcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:18px;
    border:1.5px solid var(--line);
    background:var(--paper);
    padding:26px 22px;
    display:flex;
    flex-direction:column;
    box-shadow:0 8px 24px -8px rgba(27,43,42,.18);
  }
  .face .cat-label{
    font-family:'Space Grotesk',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--marigold);
    font-weight:700;
    margin-bottom:auto;
  }
  .face .phrase{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:25px;
    line-height:1.25;
    color:var(--teal-dark);
  }
  .face .hint{
    margin-top:14px;
    font-size:13px;
    color:#8A7F66;
  }
  .face.back{
    transform:rotateY(180deg);
    background:var(--teal);
  }
  .face.back .cat-label{color:var(--cream);opacity:.6;}
  .face.back .phrase{color:var(--paper);font-size:22px;}
  .face .tap-hint{
    margin-top:auto;
    font-size:11px;
    text-align:center;
    opacity:.45;
    letter-spacing:.06em;
    text-transform:uppercase;
  }
  .face.back .tap-hint{color:var(--cream);}

  /* ---------- SCORE ACTIONS ---------- */
  .score-actions{
    display:flex;
    gap:10px;
    padding:6px 20px 4px;
    min-height:54px;
  }
  .score-btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px 10px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:transform .1s;
  }
  .score-btn:active{transform:scale(.97);}
  .score-btn.review{
    background:#F6E2D8;
    color:var(--terracotta);
  }
  .score-btn.know{
    background:#DDEDE5;
    color:var(--sage);
  }
  .score-actions[hidden]{display:none;}

  /* ---------- FOOTER ---------- */
  .progress-bar{
    height:4px;
    background:var(--line);
    border-radius:2px;
    margin:0 20px 10px;
    overflow:hidden;
  }
  .progress-bar-fill{
    height:100%;
    background:var(--marigold);
    transition:width .3s;
  }
  .stats-row{
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    font-size:12px;
    color:#8A7F66;
  }
  .reset-link{
    text-align:center;
    margin-top:18px;
    font-size:12px;
    color:#A89B7E;
    text-decoration:underline;
    cursor:pointer;
  }
  .shuffle-btn{
    background:none;
    border:none;
    color:var(--teal-dark);
    font-size:12px;
    font-weight:700;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="ticket-header">
    <div class="eyebrow"><span>Kosakata Liburan</span><span>ID → NL</span></div>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2.5 1.5V22l4-1l4 1v-1.5L13 19v-4.5l8 2.5z"/></svg>
      Vakantie-Indonesisch
    </h1>
    <div class="sub">90 woorden &amp; zinnen — eten, winkelen, onderweg, sociaal</div>
    <div class="punch left"></div>
    <div class="punch right"></div>
  </div>

  <div class="controls">
    <div class="cat-row" id="catRow"></div>
    <div class="filter-row">
      <label class="toggle">
        <input type="checkbox" id="reviewToggle">
        <span>Alleen nog niet onder de knie</span>
      </label>
      <span class="deck-count" id="deckCount"></span>
    </div>
  </div>

  <div class="card-stage">
    <div class="flashcard" id="flashcard">
      <div class="face front">
        <div class="cat-label" id="frontCat">Categorie</div>
        <div class="phrase" id="frontPhrase">—</div>
        <div class="tap-hint">Tik om te draaien</div>
      </div>
      <div class="face back">
        <div class="cat-label" id="backCat">Categorie</div>
        <div class="phrase" id="backPhrase">—</div>
        <div class="hint" id="backHint"></div>
        <div class="tap-hint">Tik om terug te draaien</div>
      </div>
    </div>
  </div>

  <div class="score-actions" id="scoreActions" hidden>
    <button class="score-btn review" id="btnReview">Nog niet 🔁</button>
    <button class="score-btn know" id="btnKnow">Weet ik al ✓</button>
  </div>

  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="stats-row">
    <span id="statsLeft">0 / 0 in dit dek</span>
    <button class="shuffle-btn" id="shuffleBtn">🔀 Schudden</button>
  </div>

  <div class="reset-link" id="resetLink">Voortgang wissen</div>
</div>

<script>

  {c:"Winkelen & onderhandelen", id:"Berapa harganya?", nl:"Wat kost het?"},

  // Vervoer
  {c:"Vervoer", id:"Di mana halte/stasiun?", nl:"Waar is de halte/het station?"},
  {c:"Vervoer", id:"Tolong ke [tempat]", nl:"Naar [plek], graag"},

  // Verblijf
  {c:"Verblijf", id:"Saya sudah reservasi kamar", nl:"Ik heb een kamer gereserveerd"},

  // Wegbeschrijving & hulp
  {c:"Wegbeschrijving & hulp", id:"Di mana toilet?", nl:"Waar is het toilet?"},
  {c:"Wegbeschrijving & hulp", id:"Belok kiri / kanan", nl:"Linksaf / rechtsaf"},

  // Noodgevallen & gezondheid
  {c:"Noodgevallen & gezondheid", id:"Saya sakit", nl:"Ik ben ziek"},

  {c:"Sociaal kletspraatje", id:"Sudah berapa lama di Indonesia?", nl:"Hoelang ben je al in Indonesië?"},
  {c:"Sociaal kletspraatje", id:"Indonesia sangat indah", nl:"Indonesië is heel mooi"},
  {c:"Sociaal kletspraatje", id:"Apa makanan favorit Anda?", nl:"Wat is jouw favoriete eten?"},
  {c:"Sociaal kletspraatje", id:"Cuaca hari ini panas, ya", nl:"Het is warm vandaag, hè"},
  {c:"Sociaal kletspraatje", id:"Boleh foto bersama?", nl:"Mogen we samen op de foto?"},
  {c:"Sociaal kletspraatje", id:"Sampai kapan Anda di sini?", nl:"Tot wanneer ben je hier?"},
  {c:"Sociaal kletspraatje", id:"Saya suka sekali di sini", nl:"Ik vind het hier heel leuk"},
  {c:"Sociaal kletspraatje", id:"Senang berkenalan dengan Anda", nl:"Leuk je te ontmoeten"},

DATA.forEach((d,i)=>d.uid = i);

const STORAGE_KEY = "kosakataLiburanProgress";
let progress = {};
try{ progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ progress = {}; }

function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }catch(e){}
}
function statusOf(uid){ return progress[uid] || "new"; }

const categories = ["Alle", ...new Set(DATA.map(d=>d.c))];
let activeCat = "Alle";
let onlyReview = false;
let queue = [];
let qIndex = 0;
let flipped = false;

const catRow = document.getElementById("catRow");
categories.forEach(cat=>{
  const btn = document.createElement("button");
  btn.className = "chip" + (cat===activeCat ? " active" : "");
  btn.textContent = cat;
  btn.onclick = ()=>{ activeCat = cat; updateChips(); buildQueue(); };
  btn.dataset.cat = cat;
  catRow.appendChild(btn);
});
function updateChips(){
  [...catRow.children].forEach(b=> b.classList.toggle("active", b.dataset.cat===activeCat));
}

document.getElementById("reviewToggle").addEventListener("change", e=>{
  onlyReview = e.target.checked;
  buildQueue();
});

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function buildQueue(){
  let pool = DATA.filter(d => activeCat==="Alle" || d.c===activeCat);
  if(onlyReview){ pool = pool.filter(d => statusOf(d.uid) !== "know"); }
  queue = shuffle(pool.slice());
  qIndex = 0;
  document.getElementById("deckCount").textContent = queue.length + " kaarten";
  showCard();
}

function showCard(){
  const flashcard = document.getElementById("flashcard");
  flashcard.classList.remove("flipped");
  flipped = false;
  document.getElementById("scoreActions").hidden = true;

  if(queue.length === 0){
    document.getElementById("frontCat").textContent = "Klaar!";
    document.getElementById("frontPhrase").textContent = "🎉 Niks meer in dit dek";
    document.getElementById("backCat").textContent = "";
    document.getElementById("backPhrase").textContent = "";
    document.getElementById("statsLeft").textContent = "0 / 0 in dit dek";
    document.getElementById("progressFill").style.width = "0%";
    return;
  }
  if(qIndex >= queue.length){ qIndex = 0; shuffle(queue); }

  const card = queue[qIndex];
  document.getElementById("frontCat").textContent = card.c;
  document.getElementById("frontPhrase").textContent = card.id;
  document.getElementById("backCat").textContent = card.c;
  document.getElementById("backPhrase").textContent = card.nl;
  document.getElementById("backHint").textContent =
    statusOf(card.uid)==="review" ? "Stond op je 'nog niet'-stapel" : "";

  document.getElementById("statsLeft").textContent = (qIndex+1) + " / " + queue.length + " in dit dek";
  document.getElementById("progressFill").style.width = Math.round(((qIndex)/queue.length)*100) + "%";
}

document.getElementById("flashcard").addEventListener("click", ()=>{
  if(queue.length === 0) return;
  flipped = !flipped;
  document.getElementById("flashcard").classList.toggle("flipped", flipped);
  document.getElementById("scoreActions").hidden = !flipped;
});

function score(result){
  const card = queue[qIndex];
  progress[card.uid] = result; // "know" or "review"
  saveProgress();
  qIndex++;
  showCard();
}
document.getElementById("btnReview").onclick = ()=>score("review");
document.getElementById("btnKnow").onclick = ()=>score("know");

document.getElementById("shuffleBtn").onclick = ()=>{ shuffle(queue); qIndex=0; showCard(); };

document.getElementById("resetLink").onclick = ()=>{
  if(confirm("Alle voortgang wissen? Dit kan niet ongedaan worden.")){
    progress = {};
    saveProgress();
    buildQueue();
  }
};

buildQueue();
</script>
</body>
</html>
